name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 푸시될 때 자동 실행됩니다. (원하시는 브랜치명으로 수정 가능)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version tag
        id: generate_version
        run: |
          # package.json에서 버전을 가져옵니다 (예: 1.0.0)
          base_version=$(node -p "require('./package.json').version")
          # 앞의 메이저.마이너 버전만 추출합니다 (예: 1.0)
          major_minor=$(echo $base_version | cut -d. -f1,2)
          # GitHub Actions 실행 횟수(run_number)를 패치 버전에 붙여서 새 버전 생성 (예: 1.0.12)
          final_version="$major_minor.${{ github.run_number }}"
          echo "tag=$final_version" >> $GITHUB_OUTPUT

      - name: Build and Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # DockerHub에 올라갈 이미지의 이름입니다. 'pdf-editor' 부분은 원하시는 이름으로 변경하세요.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pdf-editor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pdf-editor:${{ steps.generate_version.outputs.tag }}
