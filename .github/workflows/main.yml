name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 푸시될 때 자동 실행됩니다. (원하시는 브랜치명으로 수정 가능)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from package.json
        id: package_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build and Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # DockerHub에 올라갈 이미지의 이름입니다. 'pdf-editor' 부분은 원하시는 이름으로 변경하세요.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pdf-editor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pdf-editor:${{ steps.package_version.outputs.version }}
